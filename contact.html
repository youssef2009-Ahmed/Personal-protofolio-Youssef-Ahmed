<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | DevPortfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top border-bottom bg-body shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">YAD.</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="About Me.html">About Me</a></li>
                </ul>
                <div class="text-center ms-lg-3">
                    <button id="themeToggle" class="btn btn-outline-secondary rounded-circle">🌙</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card shadow-sm border-0 p-4 animate-fade-in">
                        <h2 class="fw-bold mb-4 text-center">Get In Touch</h2>
                        
                        <form id="contactForm" novalidate>
                            <div class="mb-3">
                                <label for="userName" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="userName" placeholder="John Doe" required>
                                <div class="invalid-feedback">Please enter your name.</div>
                            </div>

                            <div class="mb-3">
                                <label for="userEmail" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="userEmail" placeholder="name@example.com" required>
                                <div class="invalid-feedback">Please provide a valid email address.</div>
                            </div>

                            <div class="mb-3">
                                <label for="userMessage" class="form-label">Message</label>
                                <textarea class="form-control" id="userMessage" rows="5" minlength="10" placeholder="Your message here..." required></textarea>
                                <div class="invalid-feedback">Your message must be at least 10 characters long.</div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Send Message</button>
                        </form>
                        
                        <div id="successMessage" class="alert alert-success mt-3 d-none">
                            Thank you! Your message has been sent successfully.
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <hr class="my-4">
<div class="text-center">
    <h5 class="mb-3 fw-bold">Follow Me</h5>
    <div class="d-flex justify-content-center gap-3">

        </a>
        <a href="https://www.linkedin.com/yourname" target="_blank" class="btn btn-outline-info rounded-circle shadow-sm">
            <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="https://www.github.com/yourname" target="_blank" class="btn btn-outline-info rounded-circle shadow-sm">
            <i class="fab fa-github"></i>
        </a>
        <a href="https://www.twitter.com/yourname" target="_blank" class="btn btn-outline-info rounded-circle shadow-sm">
            <i class="fab fa-x-twitter"></i>
        </a>
        <a href="https://wa.me/201021131494" target="_blank" class="btn btn-outline-success rounded-circle shadow-sm">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
